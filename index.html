<!doctype html>
<html lang="en">
  <head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Mini App</title>
  </head>
  <body style="background:#e8dcf0;margin:0;color:#2c2936">
    <div id="root" style="min-height:100vh;background:#e8dcf0"></div>
    <script>
      (function() {
        var h = window.location.hash.slice(1);
        var p = new URLSearchParams(h || undefined);
        if (!p.has('tgWebAppPlatform')) {
          p.set('tgWebAppPlatform', (window.Telegram && window.Telegram.WebApp) ? 'android' : 'weba');
          p.set('tgWebAppVersion', '6.10');
          p.set('tgWebAppThemeParams', '{}');
          if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)
            p.set('tgWebAppData', window.Telegram.WebApp.initData);
          window.location.hash = p.toString();
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
